# ============================================================
# Docker Compose — Production AI Agent Stack
#
# Services:
#   - agent (scalable to 3 replicas)
#   - redis (cache & rate limiting)
#   - nginx (load balancer)
#
# Usage:
#   docker compose up --scale agent=3
#   docker compose down
# ============================================================

version: "3.9"

services:

  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - ENVIRONMENT=production
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=${AGENT_API_KEY:-change-me-in-production}
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=10
      - MONTHLY_BUDGET_USD=10.0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", 
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal
    # Don't expose port directly — use nginx

  # ──────────────────────────────────────
  # Redis — Cache & Rate Limiting
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  # ──────────────────────────────────────
  # Nginx — Load Balancer
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - internal

# ──────────────────────────────────────
# Volumes
# ──────────────────────────────────────
volumes:
  redis_data:

# ──────────────────────────────────────
# Networks
# ──────────────────────────────────────
networks:
  internal:
    driver: bridge
